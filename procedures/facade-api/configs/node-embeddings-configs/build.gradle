plugins {
    id 'buildlogic-gds-java'
}

description = 'Neo4j Graph Data Science :: Node Embedding Configurations'

group = 'org.neo4j.gds'

dependencies {

    annotationProcessor project(':annotations')
    annotationProcessor project(':config-generator')
    // This is needed for the generated configuration classes
    compileOnly openGds.jetbrains.annotations
    // Configuration annotations
    implementation project(':annotations')

    compileOnly openGds.immutables.value.annotations

    // Make this `api` dependency - the various `toParameters` methods return classes from here.
    api project(':node-embeddings-params')

    // `BaseConfig` lives here
    implementation project(':config-api')

    // this is needed because of `WritePropertyConfig` and `AlgoBaseConfig`
    implementation project(':core')
    // this is because `TrainBaseConfig` is here
    // TODO: remove this when we refactor `ml-algo` configs
    implementation project(':ml-algo')

    implementation project(':model-catalog-api')

    // Because Node2Vec extends RandomWalk configuration 🙈
    implementation project(':path-finding-configs')

    implementation project(':string-formatting')

    testImplementation project(':test-utils')
    testImplementation openGds.gdl
}
