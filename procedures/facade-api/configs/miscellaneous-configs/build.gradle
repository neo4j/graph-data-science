plugins {
    id 'buildlogic-gds-java'
}

description = 'Neo4j Graph Data Science :: Miscellaneous Configurations'

group = 'org.neo4j.gds'

dependencies {

    annotationProcessor project(':annotations')
    annotationProcessor project(':config-generator')
    // This is needed for the generated configuration classes
    compileOnly openGds.jetbrains.annotations

    api project(':miscellaneous-params')
    api project(':algo-params-common')

    // Configuration annotations
    implementation project(':annotations')

    // `BaseConfig` lives here
    implementation project(':config-api')

    // this is needed because of `WritePropertyConfig` and `AlgoBaseConfig`
    implementation project(':core')

    implementation project(':graph-schema-api')

    implementation project(':string-formatting')
    implementation project(':scaling-utils')

    testImplementation project(':test-utils')
    testImplementation project(':gdl-graph')
    testImplementation project(':gdl-junit-extension')
}
