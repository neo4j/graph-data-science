plugins {
    id 'buildlogic-gds-java-plain'
}

description = 'Neo4j Graph Data Science :: Edition API'

group = 'org.neo4j.gds'

dependencies {
    annotationProcessor neo4j.annotations

    compileOnly openGds.jetbrains.annotations
    compileOnly project(':annotations')

    // Test dependencies
    testCompileOnly project(':annotations')

    testImplementation project(':open-licensing')

    testImplementation platform(openGds.junit.bom)
    testImplementation neo4j.it.test.support
}
