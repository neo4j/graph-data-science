plugins {
    id 'buildlogic-gds-java'
}

description = 'Neo4j Graph Data Science :: Domain Services'

group = 'org.neo4j.gds'

test {
    useJUnitPlatform()
}

dependencies {
    // Ves is going to be so proud of me
    // We establish a layer boundary here,
    // by having this one module front several domain layer modules
    api project(':core')
    api project(':model-catalog-api')

    testImplementation platform(openGds.junit.bom)
    testImplementation 'org.junit.jupiter:junit-jupiter'

    testRuntimeOnly openGds.bundles.test.platforms
}
